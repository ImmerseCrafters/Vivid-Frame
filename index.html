<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Frame - Panel de Control</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --primary: #00e676;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1, h2, h3 { margin-top: 0; }
        .hidden { display: none !important; }
        input[type="text"], input[type="password"], input[type="time"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background-color: #00c853; }
        .btn-logout { background-color: #ff5252; color: white; margin-top: 0; width: auto; float: right; }
        .btn-logout:hover { background-color: #ff1744; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .control-group { margin-bottom: 20px; }
        input[type="range"] { width: 100%; }
        #canvas-preview { max-width: 100%; display: none; margin-top: 15px; border-radius: 8px; border: 2px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="panel">
        <h1>Vivid Frame</h1>
        <p style="color: var(--text-muted)">Inicia sesión para controlar tu marco.</p>
        <input type="text" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-login">Entrar</button>
        <p id="login-error" style="color: #ff5252; text-align: center; display: none;">Error de credenciales</p>
    </div>

    <div id="dashboard-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin:0;">Vivid Frame</h1>
            <button id="btn-logout" class="btn-logout">Salir</button>
        </div>

        <div class="panel">
            <h2>Estado del Dispositivo</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div style="font-size: 14px; color: var(--text-muted);">Batería</div>
                    <div id="val-bateria" class="stat-value">--%</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 14px; color: var(--text-muted);">SD Libre</div>
                    <div id="val-sd" class="stat-value">-- MB</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Configuración de Pantalla</h2>
            
            <div class="control-group">
                <label>Brillo: <span id="val-brillo">255</span></label>
                <input type="range" id="slider-brillo" min="0" max="255" value="255">
            </div>

            <div class="control-group" style="background: #2a2a2a; padding: 15px; border-radius: 8px;">
                <label style="display: flex; align-items: center; font-weight: bold; margin-bottom: 10px;">
                    <input type="checkbox" id="check-nocturno" style="width: 20px; height: 20px; margin-right: 10px;">
                    Activar Horario Nocturno (Apagar Pantalla)
                </label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label style="font-size: 12px; color: var(--text-muted);">Hora de Apagado</label>
                        <input type="time" id="time-inicio" value="23:00">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: var(--text-muted);">Hora de Encendido</label>
                        <input type="time" id="time-fin" value="07:00">
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Enviar Foto</h2>
            <p style="font-size: 14px; color: var(--text-muted);">La imagen se redimensionará automáticamente a 480x320 antes de enviarse.</p>
            <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp" style="margin-bottom: 10px; color: white;">
            <button id="btn-upload" disabled style="background-color: #555;">Selecciona una foto primero</button>
            <p id="upload-status" style="text-align: center; color: var(--primary);"></p>
            
            <canvas id="canvas-processor" width="480" height="320" style="display:none;"></canvas>
            <img id="canvas-preview" alt="Vista previa">
        </div>
    </div>
</div>

<script type="module">
    // Importamos las funciones necesarias del SDK v10 de Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // ---------------------------------------------------------
    // ⚠️ ATENCIÓN: PEGA AQUÍ LA CONFIGURACIÓN DE TU FIREBASE ⚠️
    // ---------------------------------------------------------
    const firebaseConfig = {
  apiKey: "AIzaSyA2_2YmpeXsXRD7V5qgXfuAc-sJLXAV8iM",
  authDomain: "vivid-frame.firebaseapp.com",
  projectId: "vivid-frame",
  storageBucket: "vivid-frame.firebasestorage.app",
  messagingSenderId: "514574497473",
  appId: "1:514574497473:web:1b0ea2eb554b46d4078640"
};

    // Inicializamos Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const storage = getStorage(app);

    // Referencias del DOM
    const loginSection = document.getElementById('login-section');
    const dashboardSection = document.getElementById('dashboard-section');
    
    // --- LÓGICA DE AUTENTICACIÓN ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            iniciarEscuchaBaseDatos();
        } else {
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        }
    });

    document.getElementById('btn-login').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, pass).catch(error => {
            document.getElementById('login-error').style.display = 'block';
        });
    });

    document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

    // --- LÓGICA DE BASE DE DATOS (Tiempo Real) ---
    function iniciarEscuchaBaseDatos() {
        // Escuchar el hardware (ESP32 escribe, Web lee)
        onValue(ref(database, 'estado'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('val-bateria').innerText = (data.bateria_porcentaje || 0) + '%';
                document.getElementById('val-sd').innerText = (data.sd_libre_mb || 0) + ' MB';
            }
        });

        // Escuchar configuración inicial para posicionar los botones (Web lee)
        onValue(ref(database, 'configuracion'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Brillo
                if(data.brillo !== undefined) {
                    document.getElementById('slider-brillo').value = data.brillo;
                    document.getElementById('val-brillo').innerText = data.brillo;
                }
                // Horario Nocturno
                if(data.horario_nocturno) {
                    document.getElementById('check-nocturno').checked = data.horario_nocturno.activado;
                    document.getElementById('time-inicio').value = data.horario_nocturno.inicio;
                    document.getElementById('time-fin').value = data.horario_nocturno.fin;
                }
            }
        }, { onlyOnce: true }); // Solo leemos 1 vez para no sobreescribir mientras el usuario toca la web
    }

    // Guardar cambios de configuración en Firebase (Web escribe, ESP32 leerá)
    function actualizarConfiguracion() {
        update(ref(database, 'configuracion'), {
            brillo: parseInt(document.getElementById('slider-brillo').value),
            horario_nocturno: {
                activado: document.getElementById('check-nocturno').checked,
                inicio: document.getElementById('time-inicio').value,
                fin: document.getElementById('time-fin').value
            }
        });
    }

    // Eventos que disparan la actualización a la base de datos
    document.getElementById('slider-brillo').addEventListener('input', (e) => {
        document.getElementById('val-brillo').innerText = e.target.value;
    });
    document.getElementById('slider-brillo').addEventListener('change', actualizarConfiguracion);
    document.getElementById('check-nocturno').addEventListener('change', actualizarConfiguracion);
    document.getElementById('time-inicio').addEventListener('change', actualizarConfiguracion);
    document.getElementById('time-fin').addEventListener('change', actualizarConfiguracion);

    // --- LÓGICA DE PROCESAMIENTO DE IMAGEN Y SUBIDA ---
    const fileInput = document.getElementById('file-input');
    const btnUpload = document.getElementById('btn-upload');
    const canvas = document.getElementById('canvas-processor');
    const ctx = canvas.getContext('2d');
    const preview = document.getElementById('canvas-preview');
    let blobListoParaSubir = null;

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // Dibujar imagen redimensionada y centrada (Recorte inteligente a 480x320)
                const targetRatio = 480 / 320;
                const imgRatio = img.width / img.height;
                let drawWidth = 480, drawHeight = 320, offsetX = 0, offsetY = 0;

                if (imgRatio > targetRatio) {
                    drawWidth = img.height * targetRatio;
                    offsetX = (img.width - drawWidth) / 2;
                    ctx.drawImage(img, offsetX, 0, drawWidth, img.height, 0, 0, 480, 320);
                } else {
                    drawHeight = img.width / targetRatio;
                    offsetY = (img.height - drawHeight) / 2;
                    ctx.drawImage(img, 0, offsetY, img.width, drawHeight, 0, 0, 480, 320);
                }

                // Mostrar vista previa
                preview.src = canvas.toDataURL('image/jpeg', 0.8);
                preview.style.display = 'block';

                // Convertir Canvas a Blob (Archivo listo para subir)
                canvas.toBlob((blob) => {
                    blobListoParaSubir = blob;
                    btnUpload.disabled = false;
                    btnUpload.style.backgroundColor = "var(--primary)";
                    btnUpload.innerText = "Subir al Marco Digital";
                }, 'image/jpeg', 0.8); // 80% de calidad JPEG
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Subir a Firebase Storage y actualizar Base de Datos
    btnUpload.addEventListener('click', async () => {
        if (!blobListoParaSubir) return;
        
        btnUpload.disabled = true;
        btnUpload.innerText = "Subiendo...";
        document.getElementById('upload-status').innerText = "";

        // Generamos un nombre único usando la fecha
        const nombreArchivo = `foto_${Date.now()}.jpg`;
        const fileRef = storageRef(storage, `fotos_marco/${nombreArchivo}`);

        try {
            // 1. Subir al Storage
            await uploadBytes(fileRef, blobListoParaSubir);
            
            // 2. Obtener URL pública
            const urlDescarga = await getDownloadURL(fileRef);

            // 3. Escribir la URL en Realtime Database para que el ESP32 la detecte
            await update(ref(database, 'fotos'), {
                ultima_subida: urlDescarga,
                timestamp: Date.now()
            });

            document.getElementById('upload-status').innerText = "¡Foto enviada con éxito!";
            btnUpload.innerText = "Subir otra foto";
        } catch (error) {
            console.error(error);
            document.getElementById('upload-status').style.color = "#ff5252";
            document.getElementById('upload-status').innerText = "Error al subir la foto.";
            btnUpload.disabled = false;
        }
    });
</script>
</body>
</html>
